<h2>Cadastrar</h2>

<!-- formulário para mostrar o currículo selecionado ou cadastrar um currículo novo -->

<form action="">
  <label for="">ID</label>
  <input type="number" [(ngModel)]="curriculo.id" name="id" placeholder="Id">
  <br>
  <label for="">Nome</label>
  <input type="text" [(ngModel)]="curriculo.nome" name="nome" placeholder="nome" required>
  <br>
  <label for="">Foto</label>
  <input type="text" [(ngModel)]="curriculo.foto" name="foto">
  <br>
  <label for="">Idade</label>
  <input type="number" [(ngModel)]="curriculo.idade" name="idade" required>
  <br>
  <label for="">Descrição</label>
  <input type="text" [(ngModel)]="curriculo.descricao" name="descricao" required>
  <br>
  <label for="">Experiências</label>
  <input type="text" [(ngModel)]="curriculo.experiencias" name="experiencias">
  <br>
  <label for="">Títulos e Cargos</label>
  <input type="text" [(ngModel)]="curriculo.titulosEcargos" name="titulosEcargos">
  <br>

  <button type="button" (click)="cadastrarCurriculo()">Cadastrar Currículo</button>
  <button type="button" (click)="atualizarCurriculo(curriculo.id)">Atualizar Currículo</button>
  <button type="button" (click)="excluirCurriculo(curriculo.id)">Excluir Currículo</button>

</form>

<!-- tabela com os currículos já cadastrados -->
<section class="listar-vagas">
  <table class="table">
    <thead>
      <tr>
        <th>ID Currículo</th>
        <th>Nome</th>
        <th>Idade</th>
        <th>Descrição</th>
        <th>Experiências</th>
        <th>Títulos e Cargos</th>
        <th>Ação</th>
      </tr>
    </thead>
    <tbody>
      @for (item of curriculos; track curriculos){
      <tr>
        <td>{{item.id}}</td>
        <td>{{item.nome}}</td>
        <td>{{item.idade}}</td>
        <td>{{item.descricao}}</td>
        <td>{{item.experiencias}}</td>
        <td>{{item.titulosEcargos}}</td>
        <td>
          <button type="button" (click)="listarCurriculoUnico(item)">
            Listar
          </button>
        </td>
      </tr>
      }
    </tbody>
  </table>
</section>

<!-- criar um footer para da espaço para a tabela  -->

<div class="footer">

</div>
